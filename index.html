<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quer Sair Comigo???</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    flex-direction: column; 
    background-color: #ffe4e1; 
    font-family: Arial, sans-serif; 
    overflow: hidden;
  }
  h1 {
    margin-bottom: 40px;
    color: #d11254;
    font-size: 2.8rem;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    z-index: 10;
  }
  .container-botoes {
    display: flex;
    gap: 20px;
    position: relative;
    height: 70px;
    width: 100%;
    max-width: 400px;
    justify-content: center;
    align-items: center;
  }
  button { 
    padding: 15px 35px; 
    font-size: 22px; 
    cursor: pointer; 
    border: none; 
    border-radius: 12px; 
    font-weight: bold;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  #sim { 
    background-color: #4CAF50; 
    color: white; 
    z-index: 10;
  }
  #nao { 
    background-color: #f44336; 
    color: white; 
    position: static; 
    z-index: 10;
    /* Suaviza um pouco a fuga para dar para ver o botão se movendo */
    transition: left 0.1s ease-out, top 0.1s ease-out; 
  }
  .ole { 
    position: absolute; 
    font-size: 28px; 
    color: #d11254; 
    font-weight: bold; 
    pointer-events: none;
    animation: fadeUp 1s ease-out forwards;
    z-index: 5;
  }
  canvas { 
    position: fixed; 
    top: 0; 
    left: 0; 
    pointer-events: none; 
    z-index: 1;
  }

  @keyframes fadeUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }
</style>
</head>
<body>

<h1>Quer sair comigo? ❤️</h1>

<div class="container-botoes">
  <button id="sim">SIM</button>
  <button id="nao">NÃO</button>
</div>

<audio id="oleSound" src="https://www.soundjay.com/human/sounds/cheer-01.mp3" preload="auto"></audio>
<canvas id="heartCanvas"></canvas>

<script>
const sim = document.getElementById('sim');
const nao = document.getElementById('nao');
const oleSound = document.getElementById('oleSound');
const canvas = document.getElementById('heartCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// --- SISTEMA DE CORAÇÕES VOADORES ---
let hearts = [];

class Heart {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 15 + 10;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        this.velocity = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed - 2 };
        this.alpha = 1;
        this.decay = Math.random() * 0.01 + 0.01;
        this.rotation = Math.random() * 0.5 - 0.25;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.beginPath();
        const d = this.size;
        ctx.moveTo(0, 0 + d/4);
        ctx.bezierCurveTo(0 - d/2, 0 - d/2, 0 - d, 0 + d/3, 0, 0 + d);
        ctx.bezierCurveTo(0 + d, 0 + d/3, 0 + d/2, 0 - d/2, 0, 0 + d/4);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }

    update() {
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.alpha -= this.decay;
    }
}

function spawnHearts(x, y) {
    const hues = [0, 330, 300]; 
    for (let i = 0; i < 30; i++) {
        const randomHue = hues[Math.floor(Math.random() * hues.length)];
        const color = `hsl(${randomHue + Math.random()*20}, 100%, ${Math.random()*20 + 50}%)`;
        hearts.push(new Heart(x, y, color));
    }
}

function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hearts.forEach((heart, index) => {
        if (heart.alpha <= 0) {
            hearts.splice(index, 1);
        } else {
            heart.update();
            heart.draw();
        }
    });
}
animate();

// --- EVENTOS DO SITE ---

sim.addEventListener('click', () => {
    for(let i = 0; i < 6; i++) {
        setTimeout(() => {
            spawnHearts(Math.random() * canvas.width, Math.random() * canvas.height);
        }, i * 150);
    }
    
    setTimeout(() => { 
        window.location.href = 'https://www.youtube.com/watch?v=izGwDsrQ1eQ&list=RDizGwDsrQ1eQ&start_radio=1'; 
    }, 1800);
});

let mudouParaAbsolute = false;

function moverBotaoNao() {
    if (!mudouParaAbsolute) {
        nao.style.position = 'absolute';
        mudouParaAbsolute = true;
    }

    // Margem de segurança de 50px para garantir que ele nunca fique colado na borda ou suma
    const padding = 50;
    const maxW = window.innerWidth - nao.offsetWidth - padding;
    const maxH = window.innerHeight - nao.offsetHeight - padding;
    
    // Sorteia a nova posição respeitando as margens de segurança
    let randomX = Math.random() * (maxW - padding) + padding;
    let randomY = Math.random() * (maxH - padding) + padding;

    nao.style.left = randomX + 'px';
    nao.style.top = randomY + 'px';
}

function falarOle() {
    const ole = document.createElement('div');
    ole.className = 'ole';
    ole.innerText = 'Olé! 🐂'; 
    
    const rect = nao.getBoundingClientRect();
    ole.style.left = (rect.left + window.scrollX) + 'px';
    ole.style.top = (rect.top + window.scrollY - 30) + 'px';
    
    document.body.appendChild(ole);
    
    oleSound.currentTime = 0;
    oleSound.play().catch(e => console.log("Áudio aguardando clique inicial."));
    
    setTimeout(() => { ole.remove(); }, 1000);
}

nao.addEventListener('mouseover', () => { moverBotaoNao(); falarOle(); });
nao.addEventListener('click', (e) => { e.preventDefault(); moverBotaoNao(); falarOle(); });
nao.addEventListener('touchstart', (e) => { e.preventDefault(); moverBotaoNao(); falarOle(); });

</script>
</body>
</html>
