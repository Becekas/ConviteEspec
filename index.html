
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quer Sair Comigo???</title>
<style>
  body { display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; background-color:#f0f8ff; font-family:Arial, sans-serif; }
  button { padding:15px 30px; margin:10px; font-size:20px; cursor:pointer; border:none; border-radius:8px; }
  #sim { background-color: #4CAF50; color: white; }
  #nao { background-color: #f44336; color: white; position:absolute; }
  .ole { position:absolute; font-size:24px; color:#ff1493; font-weight:bold; }
  canvas { position:fixed; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>
<button id="sim">SIM</button>
<button id="nao">NÃO</button>
<audio id="oleSound" src="https://www.soundjay.com/human/sounds/cheer-01.mp3"></audio>
<canvas id="fireworksCanvas"></canvas>
<script>
// Botão SIM com fogos
const sim = document.getElementById('sim');
const canvas = document.getElementById('fireworksCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

sim.addEventListener('click', () => {
    explode();
    setTimeout(()=>{ window.open('https://www.youtube.com/watch?v=izGwDsrQ1eQ', '_blank'); }, 500);
});

function explode() {
    for(let i=0;i<100;i++){
        setTimeout(()=>{
            ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*8+2,0,Math.PI*2);
            ctx.fill();
        }, i*5);
    }
    setTimeout(()=>{ctx.clearRect(0,0,canvas.width,canvas.height);},600);
}

// Botão NÃO que foge e fala Olé
const nao = document.getElementById('nao');
const oleSound = document.getElementById('oleSound');

function moveNao(){
    const x = Math.random()*(window.innerWidth-100);
    const y = Math.random()*(window.innerHeight-50);
    nao.style.left = x+'px';
    nao.style.top = y+'px';
}

function showOle(){
    const ole = document.createElement('div');
    ole.className = 'ole';
    ole.innerText = 'Olé! 🪅';
    ole.style.left = Math.random()*(window.innerWidth-100)+'px';
    ole.style.top = Math.random()*(window.innerHeight-50)+'px';
    document.body.appendChild(ole);
    oleSound.play();
    setTimeout(()=>{ole.remove();},1000);
}

nao.addEventListener('mouseover', ()=>{ moveNao(); showOle(); });

</script>
</body>
</html>
