<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quer sair comigo???</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827cc;
      --text: #e5e7eb;
      --accent: #22c55e;
      --danger: #ef4444;
      --shadow: 0 15px 40px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Noto Sans, Arial;
      background: radial-gradient(1200px 800px at 70% -10%, #1f2937, transparent),
                  radial-gradient(1000px 700px at -20% 120%, #111827, transparent),
                  var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .card {
      width: min(92vw, 720px);
      min-height: 420px;
      background: linear-gradient(180deg, #0b1222cc, #0b1222aa);
      border: 1px solid #1f2937;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(6px);
    }
    h1 {
      font-size: clamp(28px, 3.8vw, 44px);
      line-height: 1.05;
      margin: 0 0 6px;
      text-align: center;
    }
    p.sub {
      margin: 0 0 22px;
      opacity: .85;
      text-align: center;
      font-size: clamp(14px, 2.2vw, 16px);
    }
    .stage {
      position: relative;
      height: 260px;
      border-radius: 18px;
      border: 1px dashed #243047;
      background: linear-gradient(160deg, rgba(255,255,255,.03), rgba(255,255,255,0));
      overflow: hidden;
    }
    .btn {
      appearance: none;
      border: none;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, background .2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      font-size: 16px;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.98); }
    .btn--yes { background: var(--accent); color: #072a12; }
    .btn--yes:hover { filter: brightness(1.05); }
    .btn--no { background: var(--danger); color: #2a0707; position: absolute; inset: auto auto 24px 24px; }

    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: grid; gap: 12px; justify-items: center;
    }
    .hint { font-size: 12px; opacity: .7; }

    .sparkle {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(2px 2px at 20% 30%, #ffffff88, transparent),
                  radial-gradient(2px 2px at 80% 60%, #ffffff55, transparent),
                  radial-gradient(3px 3px at 50% 80%, #ffffff33, transparent);
      mix-blend-mode: screen; opacity: .5;
      animation: twinkle 2.4s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: .35; } to { opacity: .75; } }

    /* Fogos */
    .firework {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      pointer-events: none;
      animation: explode 1s ease-out forwards;
    }
    @keyframes explode {
      from { transform: scale(1); opacity: 1; }
      to { transform: scale(0); opacity: 0; }
    }

    /* Balão de fala "Olé" */
    .speech {
      position: fixed;
      background: #fff;
      color: #000;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 9999;
    }
    .speech.show {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body>
  <div class="card" role="dialog" aria-labelledby="titulo" aria-describedby="texto">
    <div class="sparkle" aria-hidden="true"></div>
    <h1 id="titulo">Quer sair comigo??? 💘</h1>
    <p class="sub" id="texto">Prometo memes, risadas e uma trilha sonora impecável 😎</p>

    <div class="stage" id="stage">
      <div class="center">
        <button class="btn btn--yes" id="yesBtn" aria-label="Sim">SIM 😍</button>
        <span class="hint">(cuidado com o \"não\"… ele foge 👀)</span>
      </div>
      <button class="btn btn--no" id="noBtn" aria-label="Não">NÃO 😅</button>
    </div>
  </div>

  <div id="speech" class="speech">Olé! 🪅</div>
  <audio id="oleSound" src="https://www.soundjay.com/human/ole-1.mp3" preload="auto"></audio>

  <script>
    // Função para criar fogos de artifício
    function createFirework(x, y) {
      const colors = ["#ff4d4d", "#ffd93d", "#4dff91", "#4dcaff", "#d24dff"];
      for (let i = 0; i < 20; i++) {
        const firework = document.createElement("div");
        firework.classList.add("firework");
        firework.style.background = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(firework);

        const angle = Math.random() * 2 * Math.PI;
        const radius = Math.random() * 120;
        const dx = Math.cos(angle) * radius;
        const dy = Math.sin(angle) * radius;

        firework.style.left = x + "px";
        firework.style.top = y + "px";

        firework.animate([
          { transform: `translate(0,0) scale(1)`, opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
        ], {
          duration: 1000 + Math.random() * 500,
          easing: "ease-out",
        });

        setTimeout(() => firework.remove(), 1500);
      }
    }

    // Mostrar "Olé!" + som em posição aleatória
    const speech = document.getElementById("speech");
    const oleSound = document.getElementById("oleSound");
    function showOle() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const randX = Math.random() * (vw - 100);
      const randY = Math.random() * (vh - 60);

      speech.style.left = randX + "px";
      speech.style.top = randY + "px";
      speech.classList.add("show");
      oleSound.currentTime = 0;
      oleSound.play();
      setTimeout(() => speech.classList.remove("show"), 800);
    }

    // Link do "SIM"
    const yesBtn = document.getElementById('yesBtn');
    yesBtn.addEventListener('click', (e) => {
      const rect = yesBtn.getBoundingClientRect();
      createFirework(rect.left + rect.width/2, rect.top + rect.height/2);
      setTimeout(() => {
        window.location.href = 'https://www.youtube.com/watch?v=izGwDsrQ1eQ';
      }, 1200);
    });

    const stage = document.getElementById('stage');
    const noBtn = document.getElementById('noBtn');

    function randomPosition() {
      const padding = 8;
      const stageRect = stage.getBoundingClientRect();
      const noRect = noBtn.getBoundingClientRect();

      const maxLeft = stageRect.width - noRect.width - padding;
      const maxTop = stageRect.height - noRect.height - padding;
      const left = Math.max(padding, Math.random() * maxLeft);
      const top = Math.max(padding, Math.random() * maxTop);

      noBtn.style.left = left + 'px';
      noBtn.style.top = top + 'px';
      noBtn.style.right = 'auto';
      noBtn.style.bottom = 'auto';
    }

    const runAway = () => {
      randomPosition();
      showOle();
    };

    noBtn.addEventListener('mouseenter', runAway);
    noBtn.addEventListener('mousemove', runAway);
    noBtn.addEventListener('focus', runAway);

    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      runAway();
    }, { passive: false });

    window.addEventListener('load', () => {
      randomPosition();
    });
    window.addEventListener('resize', () => {
      randomPosition();
    });
  </script>
</body>
</html>
